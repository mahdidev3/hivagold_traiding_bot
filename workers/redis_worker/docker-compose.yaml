services:
  redis:
    image: redis:7-alpine
    container_name: redis-worker
    command: >
      sh -c "redis-server --appendonly yes --requirepass '${REDIS_PASSWORD}' --port 6379"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a '${REDIS_PASSWORD}' ping | grep PONG"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - hivagold

volumes:
  redis_data:

networks:
  hivagold:
    name: hivagold
    driver: bridge

services:
  captcha-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: captcha-worker
    env_file:
      - .env
    ports:
      - "${CAPTCHA_WORKER_PORT:-8001}:8001"
    environment:
      - CAPTCHA_WORKER_HOST=0.0.0.0
      - CAPTCHA_WORKER_PORT=8001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - hivagold

networks:
  hivagold:
    name: hivagold
    driver: bridge

services:
  api-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: hivagold-api-server:latest
    container_name: hivagold-api-server
    env_file:
      - .env
    ports:
      - "${API_SERVER_PORT:-8000}:8000"
    environment:
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_PORT=8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - hivagold

networks:
  hivagold:
    name: hivagold
    driver: bridge

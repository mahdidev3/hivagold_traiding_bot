apiVersion: apps/v1
kind: Deployment
metadata:
  name: bot-captcha-worker
  namespace: hivagold
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bot-captcha-worker
  template:
    metadata:
      labels:
        app: bot-captcha-worker
    spec:
      containers:
        - name: bot-captcha-worker
          image: bot-captcha-worker:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
              name: http
          envFrom:
            - configMapRef:
                name: hivagold-config
          env:
            - name: CAPTCHA_WORKER_HOST
              value: 0.0.0.0
            - name: CAPTCHA_WORKER_PORT
              value: "8001"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: bot-captcha-worker
  namespace: hivagold
spec:
  selector:
    app: bot-captcha-worker
  ports:
    - port: 8001
      targetPort: http
      name: http

apiVersion: apps/v1
kind: Deployment
metadata:
  name: bot-simulator-worker
  namespace: hivagold
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bot-simulator-worker
  template:
    metadata:
      labels:
        app: bot-simulator-worker
    spec:
      containers:
        - name: bot-simulator-worker
          image: bot-simulator-worker:3.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8007
              name: http
          envFrom:
            - configMapRef:
                name: hivagold-config
          env:
            - name: SIMULATOR_WORKER_HOST
              value: 0.0.0.0
            - name: SIMULATOR_WORKER_PORT
              value: "8007"
            - name: BOT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hivagold-secrets
                  key: BOT_API_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: bot-simulator-worker
  namespace: hivagold
spec:
  selector:
    app: bot-simulator-worker
  ports:
    - port: 8007
      targetPort: http
      name: http

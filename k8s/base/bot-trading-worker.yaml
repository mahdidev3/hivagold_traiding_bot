apiVersion: apps/v1
kind: Deployment
metadata:
  name: bot-trading-worker
  namespace: hivagold
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bot-trading-worker
  template:
    metadata:
      labels:
        app: bot-trading-worker
    spec:
      containers:
        - name: bot-trading-worker
          image: bot-trading-worker:1.0.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8006
              name: http
          envFrom:
            - configMapRef:
                name: hivagold-config
          env:
            - name: TRADING_WORKER_HOST
              value: 0.0.0.0
            - name: TRADING_WORKER_PORT
              value: "8006"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hivagold-secrets
                  key: REDIS_PASSWORD
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: bot-trading-worker
  namespace: hivagold
spec:
  selector:
    app: bot-trading-worker
  ports:
    - port: 8006
      targetPort: http
      name: http

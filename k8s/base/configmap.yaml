apiVersion: v1
kind: ConfigMap
metadata:
  name: hivagold-config
  namespace: hivagold
data:
  ENVIRONMENT: development
  APP_VERSION: "1.0.0"

  # Service discovery (internal cluster DNS)
  AUTH_WORKER_URL: http://bot-auth-worker:8002
  ROOM_WORKER_URL: http://bot-trading-worker:8006
  TRADING_WORKER_URL: http://bot-trading-worker:8006
  CAPTCHA_SOLVE_URL: http://bot-captcha-worker:8001/solve

  SESSION_CACHE_FILE: /data/sessions.json
  BOT_STATE_FILE: /data/bot_state.json
  SIMULATOR_WORKER_URL: http://bot-simulator-worker:8010

  # Domain defaults (override for your real environment)
  BASE_DOMAIN: https://demo.hivagold.com
  DEFAULT_MARKET: xag
  HIVAGOLD_TENANT_ID: "11111"
